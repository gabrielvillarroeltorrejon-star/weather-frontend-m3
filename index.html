<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Tour Clima</title>

        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />

        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
            integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />

        <link rel="stylesheet" href="assets/css/styles.css" />
    </head>

    <body class="weather-app d-flex flex-column min-vh-100">
        <nav class="navbar navbar-expand-lg navbar-dark weather-app__navbar">
            <div class="container-fluid">
                <a class="navbar-brand weather-app__brand" href="#">
                    <i class="fa-solid fa-cloud-sun-rain"></i>
                    Tour Clima
                </a>

                <button
                    class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarNavAltMarkup"
                    aria-controls="navbarNavAltMarkup"
                    aria-expanded="false"
                    aria-label="Toggle navigation"
                >
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                    <div class="navbar-nav ms-auto">
                        <a
                            id="link-home"
                            class="nav-link active"
                            aria-current="page"
                            href="#"
                        >
                            Home
                        </a>
                        <a class="nav-link" href="#"> About </a>
                    </div>
                </div>
            </div>
        </nav>

        <header class="weather-app__hero container my-5">
            <h1 class="weather-app__title text-center">
                Clima de Tour Regiones RM & V
            </h1>
            <p class="weather-app__subtitle text-center text-muted">
                Conoce el clima de nuestros destinos turísticos.
            </p>
        </header>

        <main class="weather-app__main d-flex flex-column flex-grow-1">
            <section id="vista-home" class="weather-app__home py-5">
                <div class="container">
                    <div class="weather-app__results mb-4 text-center">
                        <h2 class="weather-app__results-title h4">
                            Destinos disponibles
                        </h2>
                        <p class="weather-app__results-text mb-0">
                            Revisa el clima actual de cada destino y entra al
                            detalle.
                        </p>
                    </div>

                    <div
                        id="destinos-container"
                        class="row g-4 weather-app__grid"
                    ></div>
                </div>
            </section>

            <section
                id="vista-detalle"
                class="weather-app__detail py-5 d-none flex-grow-1"
            >
                <div class="container">
                    <button
                        id="btn-volver"
                        class="btn btn-outline-light mb-4 weather-app__back-btn"
                    >
                        <i class="fa-solid fa-arrow-left"></i>
                        Volver a destinos
                    </button>

                    <div
                        id="destino-container"
                        class="weather-app__detail-content"
                    ></div>
                </div>
            </section>
        </main>
        <footer class="weather-app__footer text-center py-4 mt-auto">
            <div class="container">
                <p class="weather-app__footer-paragraph mb-1">
                    <i class="fa-solid fa-cloud-sun-rain"></i>
                    Tour Clima &copy; 2026
                </p>
            </div>
        </footer>

        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>
        <script src="assets/js/main.js"></script>
    </body>
</html>
